<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>damiens sahara spel</title>
<style>
  body {
    margin: 0;
    background: linear-gradient(#f7c873, #c98e2b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
  }
  canvas {
    border: 3px solid #333;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  #startScreen {
    position: absolute;
    text-align: center;
  }
  button, select {
    margin: 8px;
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
  }
</style>
</head>
<body>

<div id="startScreen">
  <h1>🌵 Sahara Hunt</h1>
  <p>Choose your predator & prey</p>

  <div>
    <label>Animal:</label>
    <select id="animalSelect">
      <option value="lion">🦁 Lion</option>
      <option value="tiger">🐯 Tiger</option>
    </select>
  </div>

  <div>
    <label>Zebras:</label>
    <select id="zebraCount">
      <option value="1">1</option>
      <option value="3">3</option>
      <option value="5">5</option>
    </select>
  </div>

  <button onclick="startGame()">Start Game</button>
</div>

<canvas id="game" width="500" height="500" style="display:none;"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const grid = 20;
let count = 0;
let score = 0;
let gameRunning = false;
let zebras = [];
let playerEmoji = '🦁';

let lion;

function init(zebraNum) {
  lion = {
    x: 200,
    y: 200,
    dx: grid,
    dy: 0,
    cells: [],
    maxCells: 4
  };

  zebras = [];
  for (let i = 0; i < zebraNum; i++) {
    zebras.push({
      x: Math.floor(Math.random() * 25) * grid,
      y: Math.floor(Math.random() * 25) * grid
    });
  }

  score = 0;
}

function startGame() {
  const zebraNum = parseInt(document.getElementById('zebraCount').value);
  const animal = document.getElementById('animalSelect').value;

  playerEmoji = animal === 'lion' ? '🦁' : '🐯';

  document.getElementById('startScreen').style.display = 'none';
  canvas.style.display = 'block';

  init(zebraNum);
  gameRunning = true;
}

function drawBackground() {
  // sand gradient
  const grad = ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0, '#f7d26a');
  grad.addColorStop(1, '#d99a2b');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // scattered trees
  for (let i = 0; i < 12; i++) {
    let x = (i * 40 + (i%3)*15) % canvas.width;
    let y = 350 + (i%5)*5;

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(x+5, y+45, 12, 5, 0, 0, Math.PI*2);
    ctx.fill();

    // trunk
    ctx.fillStyle = '#8b5a2b';
    ctx.fillRect(x, y, 8, 35);

    // leaves
    ctx.fillStyle = '#2e8b57';
    ctx.beginPath();
    ctx.arc(x+4, y, 14, 0, Math.PI*2);
    ctx.fill();
  }
}

function loop() {
  requestAnimationFrame(loop);
  if (!gameRunning) return;

  if (++count < 4) return;
  count = 0;

  drawBackground();

  lion.x += lion.dx;
  lion.y += lion.dy;

  if (lion.x < 0) lion.x = canvas.width - grid;
  else if (lion.x >= canvas.width) lion.x = 0;

  if (lion.y < 0) lion.y = canvas.height - grid;
  else if (lion.y >= canvas.height) lion.y = 0;

  lion.cells.unshift({ x: lion.x, y: lion.y });

  if (lion.cells.length > lion.maxCells) {
    lion.cells.pop();
  }

  // draw zebras
  ctx.font = '18px Arial';
  zebras.forEach(z => {
    ctx.fillText('🦓', z.x, z.y + 15);
  });

  lion.cells.forEach(function(cell, index) {
    ctx.fillStyle = 'orange';
    ctx.fillRect(cell.x, cell.y, grid-2, grid-2);

    if (index === 0) {
      ctx.fillText(playerEmoji, cell.x, cell.y + 15);
    }

    // eating multiple zebras
    zebras.forEach((z, zi) => {
      if (cell.x === z.x && cell.y === z.y) {
        lion.maxCells++;
        score++;
        zebras[zi] = {
          x: Math.floor(Math.random() * 25) * grid,
          y: Math.floor(Math.random() * 25) * grid
        };
      }
    });

    // self collision
    for (let i = index + 1; i < lion.cells.length; i++) {
      if (cell.x === lion.cells[i].x && cell.y === lion.cells[i].y) {
        gameRunning = false;
        alert('Game Over! Score: ' + score);
        document.getElementById('startScreen').style.display = 'block';
        canvas.style.display = 'none';
      }
    }
  });

  // score
  ctx.fillStyle = '#222';
  ctx.font = '18px Arial';
  ctx.fillText('Score: ' + score, 10, 25);
}

// controls

document.addEventListener('keydown', function(e) {
  if (!lion) return;

  if (e.key === 'ArrowLeft' && lion.dx === 0) {
    lion.dx = -grid;
    lion.dy = 0;
  } else if (e.key === 'ArrowUp' && lion.dy === 0) {
    lion.dy = -grid;
    lion.dx = 0;
  } else if (e.key === 'ArrowRight' && lion.dx === 0) {
    lion.dx = grid;
    lion.dy = 0;
  } else if (e.key === 'ArrowDown' && lion.dy === 0) {
    lion.dy = grid;
    lion.dx = 0;
  }
});

requestAnimationFrame(loop);
</script>
</body>
</html>
