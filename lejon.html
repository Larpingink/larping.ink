<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sahara Hunt</title>
<style>
  body {
    margin: 0;
    background: radial-gradient(circle at top, #ffd27a, #c98e2b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
  }
  canvas {
    border-radius: 16px;
    box-shadow: 0 25px 70px rgba(0,0,0,0.6);
  }
  .panel {
    position: absolute;
    text-align: center;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  button, select {
    margin: 8px;
    padding: 10px 14px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
  }
  h1 { margin: 0 0 10px; }
  .hidden { display:none; }
</style>
</head>
<body>

<div id="startScreen" class="panel">
  <h1>🌵 Sahara Hunt</h1>
  <p>Choose your hunt</p>

  <div>
    <label>Animal:</label>
    <select id="animalSelect">
      <option value="lion">🦁 Lion</option>
      <option value="tiger">🐯 Tiger</option>
    </select>
  </div>

  <div>
    <label>Zebras:</label>
    <select id="zebraCount">
      <option value="1">1</option>
      <option value="3">3</option>
      <option value="5">5</option>
    </select>
  </div>

  <div>
    <label>Difficulty:</label>
    <select id="difficulty">
      <option value="slow">🟢 Easy</option>
      <option value="normal">🟡 Normal</option>
      <option value="fast">🔴 Hard</option>
    </select>
  </div>

  <button onclick="startGame()">▶ Start Hunt</button>
</div>

<div id="gameOverScreen" class="panel hidden">
  <h1>💀 Game Over</h1>
  <p id="finalScore"></p>
  <p id="bestScore"></p>
  <button onclick="restartGame()">🔁 Play Again</button>
  <button onclick="goToMenu()">🏠 Main Menu</button>
</div>

<canvas id="game" width="500" height="500" class="hidden"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const grid = 20;
let count = 0;
let score = 0;
let best = localStorage.getItem('saharaBest') || 0;
let speed = 4;
let gameRunning = false;
let zebras = [];
let playerEmoji = '🦁';
let lion;

function init(zebraNum) {
  lion = { x: 200, y: 200, dx: grid, dy: 0, cells: [], maxCells: 4 };
  zebras = [];
  for (let i = 0; i < zebraNum; i++) {
    zebras.push({ x: Math.floor(Math.random()*25)*grid, y: Math.floor(Math.random()*25)*grid });
  }
  score = 0;
}

function startGame() {
  const zebraNum = +document.getElementById('zebraCount').value;
  const animal = document.getElementById('animalSelect').value;
  const diff = document.getElementById('difficulty').value;

  playerEmoji = animal === 'lion' ? '🦁' : '🐯';
  speed = diff === 'slow' ? 6 : diff === 'normal' ? 4 : 2;

  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  canvas.classList.remove('hidden');

  init(zebraNum);
  gameRunning = true;
}

function endGame() {
  gameRunning = false;
  if (score > best) {
    best = score;
    localStorage.setItem('saharaBest', best);
  }
  document.getElementById('finalScore').innerText = 'Score: ' + score;
  document.getElementById('bestScore').innerText = 'Best: ' + best;

  document.getElementById('gameOverScreen').classList.remove('hidden');
  canvas.classList.add('hidden');
}

function restartGame() {
  document.getElementById('gameOverScreen').classList.add('hidden');
  startGame();
}

function goToMenu() {
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
}

function drawBackground() {
  const grad = ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0, '#f7d26a');
  grad.addColorStop(1, '#c98e2b');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  for (let i=0;i<10;i++) ctx.fillRect(0,i*50,canvas.width,10);

  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.beginPath();
  ctx.moveTo(0,300);
  ctx.quadraticCurveTo(250,260,500,300);
  ctx.lineTo(500,500);
  ctx.lineTo(0,500);
  ctx.fill();
}

function loop() {
  requestAnimationFrame(loop);
  if (!gameRunning) return;

  if (++count < speed) return;
  count = 0;

  drawBackground();

  lion.x += lion.dx;
  lion.y += lion.dy;

  if (lion.x < 0) lion.x = canvas.width - grid;
  else if (lion.x >= canvas.width) lion.x = 0;
  if (lion.y < 0) lion.y = canvas.height - grid;
  else if (lion.y >= canvas.height) lion.y = 0;

  lion.cells.unshift({ x: lion.x, y: lion.y });
  if (lion.cells.length > lion.maxCells) lion.cells.pop();

  ctx.font = '18px Arial';
  zebras.forEach(z => ctx.fillText('🦓', z.x, z.y+15));

  lion.cells.forEach((cell, index) => {
    ctx.fillStyle = 'orange';
    ctx.fillRect(cell.x, cell.y, grid-2, grid-2);
    if (index===0) ctx.fillText(playerEmoji, cell.x, cell.y+15);

    zebras.forEach((z,zi)=>{
      if (cell.x===z.x && cell.y===z.y) {
        lion.maxCells++; score++;
        zebras[zi] = { x: Math.floor(Math.random()*25)*grid, y: Math.floor(Math.random()*25)*grid };
      }
    });

    for (let i=index+1;i<lion.cells.length;i++) {
      if (cell.x===lion.cells[i].x && cell.y===lion.cells[i].y) endGame();
    }
  });

  ctx.fillStyle = '#222';
  ctx.font = '20px Arial';
  ctx.fillText('Score: '+score, 10, 25);
}

// controls

document.addEventListener('keydown', e => {
  if (!lion) return;
  if (e.key==='ArrowLeft' && lion.dx===0) { lion.dx=-grid; lion.dy=0; }
  else if (e.key==='ArrowUp' && lion.dy===0) { lion.dy=-grid; lion.dx=0; }
  else if (e.key==='ArrowRight' && lion.dx===0) { lion.dx=grid; lion.dy=0; }
  else if (e.key==='ArrowDown' && lion.dy===0) { lion.dy=grid; lion.dx=0; }
});

requestAnimationFrame(loop);
</script>
</body>
</html>
